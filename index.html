<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZ Sync 🧸 - Multi-Timezone Meeting Scheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    .timezone-card {
      backdrop-filter: blur(10px);
    }
    .hour-marker {
      transition: all 0.2s ease;
    }
    .current-time-line {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .overlap-zone {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.3) 50%, rgba(34, 197, 94, 0.2) 100%);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen font-sans text-white">
  
  <!-- Header -->
  <header class="border-b border-slate-700/50 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="text-2xl">🧸</div>
        <h1 class="text-xl font-bold">TZ Sync</h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-slate-400" id="currentDate"></span>
        <button onclick="toggleSettings()" class="p-2 hover:bg-slate-700 rounded-lg transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    
    <!-- Timezone Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="timezoneCards">
      <!-- Cards will be injected by JS -->
    </div>

    <!-- Timeline View -->
    <div class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700/50">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">24-Hour Timeline</h2>
        <div class="flex items-center gap-2 text-sm">
          <span class="w-3 h-3 rounded bg-green-500/30"></span>
          <span class="text-slate-400">Good meeting hours (9AM-6PM overlap)</span>
        </div>
      </div>
      
      <!-- Timeline -->
      <div class="relative" id="timeline">
        <!-- Hour labels -->
        <div class="flex justify-between text-xs text-slate-500 mb-2">
          <span>00:00</span>
          <span>06:00</span>
          <span>12:00</span>
          <span>18:00</span>
          <span>24:00</span>
        </div>
        
        <!-- Timeline rows will be injected by JS -->
        <div id="timelineRows" class="space-y-3">
        </div>
        
        <!-- Current time indicator -->
        <div id="currentTimeIndicator" class="absolute top-0 bottom-0 w-0.5 bg-red-500 current-time-line" style="left: 50%;">
          <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-red-500 rounded-full"></div>
        </div>
      </div>
    </div>

    <!-- Quick Reference -->
    <div class="mt-8 bg-slate-800/50 rounded-2xl p-6 border border-slate-700/50">
      <h2 class="text-lg font-semibold mb-4">🕐 Quick Reference</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="quickReference">
        <!-- Will be injected by JS -->
      </div>
    </div>

  </main>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-slate-800 rounded-2xl p-6 max-w-md w-full border border-slate-700">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Settings</h2>
        <button onclick="toggleSettings()" class="p-2 hover:bg-slate-700 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Your Timezone</label>
          <select id="tz1" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white">
            <option value="auto">Auto-detect</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Timezone 2 (HK/Singapore)</label>
          <select id="tz2" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white">
            <option value="Asia/Singapore">Singapore</option>
            <option value="Asia/Hong_Kong">Hong Kong</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Timezone 3 (CET)</label>
          <select id="tz3" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white">
            <option value="Europe/Berlin">Berlin (CET/CEST)</option>
            <option value="Europe/Paris">Paris (CET/CEST)</option>
            <option value="Europe/Amsterdam">Amsterdam (CET/CEST)</option>
            <option value="Europe/Zurich">Zurich (CET/CEST)</option>
          </select>
        </div>
      </div>
      
      <button onclick="saveSettings()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition">
        Save Settings
      </button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-slate-700/50 mt-12 py-6 text-center text-slate-500 text-sm">
    <p>TZ Sync • Built by Little Bear 🐻 • <a href="https://github.com/little0xbear/tz-sync" class="hover:text-white transition">GitHub</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
