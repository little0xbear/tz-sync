<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZ Sync 🧸 - Multi-Timezone Meeting Scheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    .slot-row {
      transition: all 0.15s ease;
    }
    .slot-row:active {
      transform: scale(0.98);
    }
    .good-meeting {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.12) 0%, rgba(34, 197, 94, 0.08) 100%);
      border-left: 3px solid rgb(34, 197, 94);
    }
    .current-hour {
      background: rgba(59, 130, 246, 0.15);
      border-left: 3px solid rgb(59, 130, 246);
    }
    .time-badge {
      min-width: 60px;
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen font-sans text-white pb-20">
  
  <!-- Fixed Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800">
    <div class="px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-2xl">🧸</span>
          <div>
            <h1 class="text-lg font-bold">TZ Sync</h1>
            <p class="text-xs text-slate-500" id="currentDate"></p>
          </div>
        </div>
        <button onclick="openSettings()" class="p-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl transition">
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Current Time Cards - Horizontal Scroll on Mobile -->
  <section class="pt-20 px-4 py-4">
    <div class="flex gap-3 overflow-x-auto pb-2 -mx-4 px-4 snap-x snap-mandatory" id="currentTimeCards">
      <!-- Injected by JS -->
    </div>
    <!-- Legend -->
    <div class="flex items-center gap-4 mt-3 text-xs text-slate-500">
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-green-500"></span>
        <span>Good for all</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
        <span>Now</span>
      </div>
    </div>
  </section>

  <!-- Vertical Timeline -->
  <section class="px-4">
    <div class="bg-slate-800/30 rounded-2xl border border-slate-700/50 overflow-hidden">
      <!-- Timeline Header -->
      <div class="px-4 py-3 border-b border-slate-700/50 bg-slate-800/50">
        <h2 class="font-semibold">Today's Hours</h2>
      </div>
      
      <!-- Timeline Rows -->
      <div id="timelineSlots" class="divide-y divide-slate-700/30">
        <!-- Injected by JS -->
      </div>
    </div>
  </section>

  <!-- Slot Details Modal -->
  <div id="slotModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-slate-800 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl">
      <div class="px-5 py-4 border-b border-slate-700 flex items-center justify-between">
        <h3 class="font-semibold">Meeting Time</h3>
        <button onclick="closeSlotModal()" class="p-2 hover:bg-slate-700 rounded-lg transition -mr-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-5 space-y-4" id="slotModalContent">
        <!-- Injected by JS -->
      </div>
      <div class="px-5 py-4 border-t border-slate-700 flex gap-3">
        <button onclick="copySlotDetails()" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-medium transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
          </svg>
          Copy
        </button>
        <button onclick="closeSlotModal()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-medium transition">
          Done
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-slate-800 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl max-h-[85vh] flex flex-col">
      <div class="px-5 py-4 border-b border-slate-700 flex items-center justify-between flex-shrink-0">
        <h3 class="font-semibold">Configure Zones</h3>
        <button onclick="closeSettings()" class="p-2 hover:bg-slate-700 rounded-lg transition -mr-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 space-y-5" id="settingsContent">
        <!-- Zone 1 -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-slate-300">Your Zone</label>
          <select id="tz1Select" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </select>
        </div>
        
        <!-- Zone 2 -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-slate-300">Zone 2</label>
          <select id="tz2Select" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </select>
        </div>
        
        <!-- Zone 3 -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-slate-300">Zone 3</label>
          <select id="tz3Select" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </select>
        </div>

        <!-- Work Hours -->
        <div class="space-y-2 pt-4 border-t border-slate-700">
          <label class="block text-sm font-medium text-slate-300">Work Hours</label>
          <div class="flex items-center gap-3">
            <select id="workStart" class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </select>
            <span class="text-slate-500">to</span>
            <select id="workEnd" class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </select>
          </div>
        </div>
      </div>
      <div class="px-5 py-4 border-t border-slate-700 flex gap-3 flex-shrink-0">
        <button onclick="closeSettings()" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-medium transition">
          Cancel
        </button>
        <button onclick="saveSettings()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-medium transition">
          Save
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 py-3 text-center text-slate-600 text-xs bg-slate-900/90 border-t border-slate-800">
    Built by Little Bear 🐻
  </footer>

  <script src="app.js"></script>
</body>
</html>
